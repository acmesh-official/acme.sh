name: DNS Czechia Test CI

on:
  push:
    branches: [ "master", "dev" ]
  workflow_dispatch: 

jobs:
  test-plugin:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Syntax check
      run: bash -n dnsapi/dns_czechia.sh

    - name: Run ONLY Czechia DNS Test
      env:
        TokenName1: ${{ secrets.CZ_TOKEN }}
        TokenName2: ${{ secrets.CZ_ZONES }}
        TEST_DNS: dns_czechia
        TEST_DNS_SLEEP: 120
        # TADY JE TA OPRAVA: Řekneme frameworku, který testovací soubor má spustit
        CASE: le_test_dnsapi
      run: |
        git clone --depth 1 https://github.com/acmesh-official/acmetest.git ../acmetest
        # Spustíme rundocker.sh bez argumentu, on si CASE vytáhne z ENV
        cd ../acmetest && ./rundocker.sh
