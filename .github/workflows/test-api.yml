name: Manual API Test
on: workflow_dispatch  # Umožní ti to spustit ručně tlačítkem v Actions

jobs:
  check-api:
    runs-on: ubuntu-latest
    steps:
    - name: Test API v Dockeru
      run: |
        # 1. Vytvoříme soubor s proměnnými pro Docker
        echo "CZ_AuthorizationToken=${{ secrets.TokenValue1 }}" > docker.env
        echo "CZ_Zones=${{ secrets.TokenValue2 }}" >> docker.env
      
        # 2. Spustíme curl uvnitř Dockeru (příklad)
        docker run --env-file docker.env debian:latest sh -c "apt-get update && apt-get install -y curl && curl -i -X POST https://api.czechia.com/api/DNS/zoner-test.eu/TXT -H \"AuthorizationToken: \$CZ_AuthorizationToken\" -H \"Content-Type: application/json\" -d '{\"hostName\":\"docker-test\",\"text\":\"123\",\"ttl\":3600,\"publishZone\":1}'"
